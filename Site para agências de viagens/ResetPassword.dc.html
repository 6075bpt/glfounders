<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
</head>
<body>
<x-dc>
<helmet>
  <template id="__bundler_thumbnail">
    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
      <rect width="200" height="200" fill="#ffffff"></rect>
      <rect x="60" y="60" width="80" height="80" rx="14" fill="#14161a"></rect>
      <text x="100" y="108" text-anchor="middle" font-family="sans-serif" font-weight="800" font-size="26" fill="#e7e7e7">GL</text>
    </svg>
  </template>
  <meta charset="utf-8"></meta>
  <meta name="viewport" content="width=device-width, initial-scale=1"></meta>
  <title>Nova senha — GL Negócios</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"></link>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800&display=swap" rel="stylesheet"></link>
  <style>
    * { box-sizing: border-box; }
    body { margin: 0; padding: 0; }
    input { font-family: 'Poppins', sans-serif; }
    input:focus { outline: 2px solid #0E7C8C33; border-color:#0E7C8C !important; }
  </style>
</helmet>

<div style="font-family: 'Poppins', sans-serif; background:#ffffff; color:#16181d; min-height:100vh; display:flex; align-items:center; justify-content:center; padding:24px;">
  <div style="width:100%; max-width:400px; background:#fff; border:1px solid #eef0f2; border-radius:18px; padding:30px 28px; box-shadow:0 20px 50px -24px rgba(20,30,40,0.2);">

    <sc-if value="{{ showLoading }}" hint-placeholder-val="{{ true }}">
      <div style="text-align:center; color:#8a8f98; font-size:14px; padding:20px 0;">Verificando link…</div>
    </sc-if>

    <sc-if value="{{ showInvalid }}" hint-placeholder-val="{{ false }}">
      <div style="text-align:center; color:#5b5f68; font-size:14px; padding:20px 0;">Link inválido ou expirado. Solicite outro em <a href="./Login.dc.html" style="color:#0E7C8C;">Entrar</a>.</div>
    </sc-if>

    <sc-if value="{{ showForm }}" hint-placeholder-val="{{ false }}">
      <form onSubmit="{{ onSubmit }}" style="display:flex; flex-direction:column; gap:14px;">
        <h2 style="font-size:17px; font-weight:700; margin:0;">Defina sua nova senha</h2>
        <label style="font-size:12.5px; font-weight:600; color:#5b5f68;">Nova senha
          <input type="password" value="{{ password }}" onChange="{{ onPasswordChange }}" required="{{ true }}" minLength="{{ 6 }}" style="width:100%; margin-top:6px; padding:11px 13px; border:1px solid #e2e5e9; border-radius:10px; font-size:14px;"></input>
        </label>
        <sc-if value="{{ hasMessage }}" hint-placeholder-val="{{ false }}">
          <div style="{{ messageStyle }}">{{ messageText }}</div>
        </sc-if>
        <button type="submit" disabled="{{ loading }}" style="margin-top:4px; background:#0E7C8C; color:#fff; border:none; padding:13px; border-radius:10px; font-weight:700; font-size:14.5px; cursor:pointer;">{{ submitLabel }}</button>
      </form>
    </sc-if>

    <sc-if value="{{ showSuccess }}" hint-placeholder-val="{{ false }}">
      <div style="text-align:center; display:flex; flex-direction:column; gap:14px;">
        <div style="font-size:14px; color:#0E7C8C; font-weight:600;">Senha atualizada com sucesso.</div>
        <a href="./Dashboard.dc.html" style="background:#0E7C8C; color:#fff; padding:12px; border-radius:10px; font-weight:700; font-size:14px;">Ir para o painel</a>
      </div>
    </sc-if>

  </div>
</div>

</x-dc>
<script type="text/x-dc" data-dc-script>
class Component extends DCLogic {
  state = { status: 'loading', password: '', loading: false, messageText: '', messageIsError: false };

  async componentDidMount() {
    const cfg = await import('./supabase-config.js');
    if (!cfg.SUPABASE_CONFIGURED) {
      this.setState({ status: 'invalid' });
      return;
    }
    this._supabase = await cfg.getSupabase();
    const { data } = await this._supabase.auth.getSession();
    this.setState({ status: data.session ? 'ready' : 'invalid' });
    this._supabase.auth.onAuthStateChange((event, session) => {
      if (event === 'PASSWORD_RECOVERY' || session) this.setState({ status: 'ready' });
    });
  }

  handleSubmit = async (e) => {
    e.preventDefault();
    this.setState({ loading: true, messageText: '' });
    try {
      const { error } = await this._supabase.auth.updateUser({ password: this.state.password });
      if (error) throw error;
      this.setState({ status: 'success' });
    } catch (e) {
      this.setState({ messageText: 'Não foi possível atualizar. Tente novamente.', messageIsError: true });
    } finally {
      this.setState({ loading: false });
    }
  };

  renderVals() {
    const s = this.state;
    const messageStyle = 'font-size:13px; padding:10px 12px; border-radius:10px; ' +
      (s.messageIsError ? 'background:#FBEDEC; color:#c0392b;' : 'background:#EEF7F8; color:#0E7C8C;');
    return {
      showLoading: s.status === 'loading',
      showInvalid: s.status === 'invalid',
      showForm: s.status === 'ready',
      showSuccess: s.status === 'success',
      password: s.password,
      onPasswordChange: (e) => this.setState({ password: e.target.value }),
      onSubmit: this.handleSubmit,
      loading: s.loading,
      hasMessage: !!s.messageText,
      messageText: s.messageText,
      messageStyle,
      submitLabel: s.loading ? 'Salvando…' : 'Salvar nova senha'
    };
  }
}

</script>
</body>
</html>
