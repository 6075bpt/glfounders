<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
</head>
<body>
<x-dc>
<helmet>
  <meta charset="utf-8"></meta>
  <meta name="viewport" content="width=device-width, initial-scale=1"></meta>
  <title>{{ pageTitle }}</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"></link>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800&display=swap" rel="stylesheet"></link>
  <style>
    * { box-sizing: border-box; }
    body { margin: 0; padding: 0; }
    a { color: #1a1a1a; text-decoration: none; }
    a:hover { color: #000; }
    .post-content { font-size: 17px; line-height: 1.85; color: #31404a; }
    .post-content p { margin: 0 0 26px; }
    .post-content a { color: #1a1a1a; text-decoration: underline; }
    .post-content strong { color: #16181d; }
    .post-content h2 { font-size: 28px; font-weight: 700; margin: 40px 0 20px; color: #16181d; line-height: 1.3; }
    .post-content h3 { font-size: 20px; font-weight: 700; margin: 28px 0 16px; color: #16181d; }
    .post-content img { max-width: 100%; height: auto; border-radius: 12px; margin: 24px 0; display: block; }
    .post-content ul, .post-content ol { margin: 0 0 24px 24px; padding: 0; }
    .post-content li { margin-bottom: 10px; }
    .post-content blockquote { border-left: 4px solid #1a1a1a; padding-left: 20px; margin: 24px 0; color: #5b5f68; font-style: italic; }
  </style>
</helmet>

<div style="font-family: 'Poppins', sans-serif; background:#ffffff; color:#16181d; min-height:100vh;">

  <header style="display:flex; align-items:center; justify-content:space-between; gap:16px; padding:18px 5vw; border-bottom:1px solid #eef0f2;">
    <a href="./Blog.dc.html" style="display:flex; align-items:center; gap:10px;">
      <div style="width:38px; height:38px; border-radius:9px; background:#14161a; display:flex; align-items:center; justify-content:center; overflow:hidden;">
        <img src="assets/gl-logo.png" alt="GL" style="width:94%; height:94%; object-fit:contain;"></img>
      </div>
      <span style="font-weight:700; font-size:15px;">GL Negócios</span>
    </a>
    <a href="./Blog.dc.html" style="font-size:13.5px; font-weight:600; color:#5b5f68;">← Voltar ao blog</a>
  </header>

  <sc-if value="{{ loading }}" hint-placeholder-val="{{ true }}">
    <div style="text-align:center; padding:80px; color:#8a8f98;">Carregando…</div>
  </sc-if>

  <sc-if value="{{ notFound }}" hint-placeholder-val="{{ false }}">
    <div style="text-align:center; padding:80px; color:#8a8f98;">Artigo não encontrado.</div>
  </sc-if>

  <sc-if value="{{ hasPost }}" hint-placeholder-val="{{ false }}">
    <article style="max-width:1080px; margin:0 auto; padding:40px 5vw 90px;">
      <div style="max-width:820px; margin:0 auto 32px; text-align:left;">
        <span style="font-size:12px; font-weight:700; letter-spacing:0.6px; color:#5b5b5b; text-transform:uppercase;">{{ categoryLabel }}</span>
        <h1 style="font-size:clamp(26px,4vw,38px); font-weight:800; letter-spacing:-0.7px; line-height:1.25; margin:10px 0 14px; color:#16181d; text-align:left;">{{ title }}</h1>
        <p style="font-size:16px; color:#5b5f68; line-height:1.6; margin:0 0 16px; text-align:left;">{{ deckText }}</p>
        <div style="display:flex; align-items:center; justify-content:space-between; flex-wrap:wrap; gap:12px; padding-bottom:18px; border-bottom:1px solid #eef0f2;">
          <div style="display:flex; gap:16px; align-items:center;">
            <span style="font-size:13px; color:#8a8f98;">Por GL Negócios</span>
            <span style="font-size:13px; color:#8a8f98;">{{ dateLabel }}</span>
            <span style="font-size:13px; color:#8a8f98;">{{ readTime }}</span>
          </div>
          <div style="display:flex; gap:10px;">
            <a href="https://wa.me/5569992774553" target="_blank" rel="noopener" style="width:32px; height:32px; border-radius:50%; background:#f4f5f7; display:flex; align-items:center; justify-content:center;">
              <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="#1a1a1a" strokeWidth="2"><path d="M18 8a3 3 0 1 0-2.83-4M6 12a3 3 0 1 0 0 4M18 20a3 3 0 1 0-2.83-4M8.6 13.5l6.8 4M15.4 6.5l-6.8 4"></path></svg>
            </a>
          </div>
        </div>
      </div>

      <div style="display:grid; grid-template-columns:1fr 280px; gap:40px; max-width:1080px; margin:0 auto; align-items:start;">
        <div style="min-width:0;">
          <div style="{{ coverStyle }}"></div>
          <sc-if value="{{ hasCaption }}" hint-placeholder-val="{{ false }}">
            <p style="font-size:12.5px; color:#8a8f98; margin:-32px 0 32px; text-align:center;">{{ captionText }}</p>
          </sc-if>
          <div class="post-content" dangerouslySetInnerHTML="{{ contentHtml }}"></div>
        </div>

        <aside style="display:flex; flex-direction:column; gap:16px; position:sticky; top:24px;">
          <div style="background:#f4f5f7; border-radius:14px; padding:20px;">
            <div style="font-size:11.5px; font-weight:700; letter-spacing:0.6px; color:#8a8f98; text-transform:uppercase; margin-bottom:12px;">Continue lendo</div>
            <a href="./Blog.dc.html" style="display:block; font-size:14px; font-weight:600; color:#16181d; margin-bottom:10px;">← Ver todos os artigos</a>
          </div>
          <div style="background:#1a1a1a; border-radius:14px; padding:22px; color:#fff;">
            <p style="font-size:14px; margin:0 0 12px; line-height:1.5;">Quer aplicar isso no seu negócio?</p>
            <a href="https://wa.me/5569992774553" target="_blank" rel="noopener" style="display:inline-block; background:#fff; color:#1a1a1a; padding:10px 18px; border-radius:100px; font-weight:700; font-size:13px;">
              Fale com um especialista
            </a>
          </div>
        </aside>
      </div>
    </article>
  </sc-if>

</div>


</x-dc>
<script type="text/x-dc" data-dc-script>
class Component extends DCLogic {
  state = { post: null, loading: true };

  async componentDidMount() {
    try {
      const params = new URLSearchParams(window.location.search);
      const slug = params.get('slug');
      const cfg = await import('./supabase-config.js');
      if (!cfg.SUPABASE_CONFIGURED || !slug) {
        this.setState({ loading: false });
        return;
      }
      const supabase = await cfg.getSupabase();
      const { data, error } = await supabase
        .from('posts')
        .select('*')
        .eq('slug', slug)
        .eq('status', 'published')
        .maybeSingle();
      if (error) throw error;
      this.setState({ post: data, loading: false });
    } catch (e) {
      console.error(e);
      this.setState({ loading: false });
    }
  }

  formatContent(raw) {
    if (!raw) return '';
    // If it already has block-level HTML tags, leave as-is.
    if (/<(p|h1|h2|h3|ul|ol|li|blockquote|div)[\s>]/i.test(raw)) return raw;
    // Plain text: split on blank lines into paragraphs.
    return raw
      .split(/\n\s*\n/)
      .map((block) => block.trim())
      .filter(Boolean)
      .map((block) => '<p>' + block.replace(/\n/g, '<br>') + '</p>')
      .join('');
  }

  renderVals() {
    const post = this.state.post;
    const dateLabel = post && post.published_at
      ? new Date(post.published_at).toLocaleDateString('pt-BR', { day: '2-digit', month: 'long', year: 'numeric' })
      : '';
    const coverStyle = post && post.cover_image_url
      ? ("width:100%; aspect-ratio:4/3; border-radius:10px; background-image:url('" + post.cover_image_url + "'); background-size:cover; background-position:center; margin-bottom:16px;")
      : "display:none;";
    return {
      loading: this.state.loading,
      hasPost: !this.state.loading && !!post,
      notFound: !this.state.loading && !post,
      pageTitle: post ? (post.meta_title || post.title) : 'Blog — GL Negócios',
      title: post ? post.title : '',
      deckText: post ? (post.excerpt || '') : '',
      categoryLabel: post ? (post.category || 'Geral') : '',
      dateLabel,
      readTime: post ? (post.read_time || '5 min de leitura') : '',
      coverStyle,
      hasCaption: !!(post && post.cover_caption),
      captionText: post ? (post.cover_caption || '') : '',
      contentHtml: { __html: post ? this.formatContent(post.content) : '' }
    };
  }
}

</script>
</body>
</html>
