<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
</head>
<body>
<x-dc>
<helmet>
  <template id="__bundler_thumbnail">
    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
      <rect width="200" height="200" fill="#ffffff"></rect>
      <rect x="60" y="60" width="80" height="80" rx="14" fill="#14161a"></rect>
      <text x="100" y="108" text-anchor="middle" font-family="sans-serif" font-weight="800" font-size="26" fill="#e7e7e7">GL</text>
    </svg>
  </template>
  <meta charset="utf-8"></meta>
  <meta name="viewport" content="width=device-width, initial-scale=1"></meta>
  <title>Minha conta — GL Negócios</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"></link>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800&display=swap" rel="stylesheet"></link>
  <style>
    * { box-sizing: border-box; }
    body { margin: 0; padding: 0; }
    a { color: #0E7C8C; text-decoration: none; }
  </style>
</helmet>

<div style="font-family: 'Poppins', sans-serif; background:#FAFBFC; color:#16181d; min-height:100vh;">

  <sc-if value="{{ showLoading }}" hint-placeholder-val="{{ true }}">
    <div style="min-height:100vh; display:flex; align-items:center; justify-content:center; color:#8a8f98; font-size:14px;">Carregando…</div>
  </sc-if>

  <sc-if value="{{ showLoggedOut }}" hint-placeholder-val="{{ false }}">
    <div style="min-height:100vh; display:flex; align-items:center; justify-content:center; padding:24px;">
      <div style="text-align:center; display:flex; flex-direction:column; gap:14px; max-width:360px;">
        <h2 style="font-size:18px; font-weight:700; margin:0;">Você precisa entrar</h2>
        <p style="color:#5b5f68; font-size:14px; margin:0;">Esta área é exclusiva para usuários autenticados.</p>
        <a href="./Login.dc.html" style="background:#0E7C8C; color:#fff; padding:12px 22px; border-radius:100px; font-weight:700; font-size:14px;">Ir para o login</a>
      </div>
    </div>
  </sc-if>

  <sc-if value="{{ showDashboard }}" hint-placeholder-val="{{ false }}">
    <div>
      <header style="display:flex; align-items:center; justify-content:space-between; gap:16px; padding:18px 5vw; background:#fff; border-bottom:1px solid #eef0f2;">
        <a href="./GL Metodo G3.dc.html" style="display:flex; align-items:center; gap:10px;">
          <div style="width:34px; height:34px; border-radius:8px; background:#14161a; display:flex; align-items:center; justify-content:center; overflow:hidden;">
            <img src="assets/gl-logo.png" alt="GL" style="width:94%; height:94%; object-fit:contain;"></img>
          </div>
          <span style="font-weight:700; font-size:15px;">GL Negócios</span>
        </a>
        <button onClick="{{ onLogout }}" style="background:#fff; border:1px solid #e2e5e9; padding:9px 16px; border-radius:100px; font-size:13px; font-weight:600; cursor:pointer; color:#5b5f68;">Sair</button>
      </header>

      <div style="max-width:720px; margin:0 auto; padding:48px 5vw 80px; display:flex; flex-direction:column; gap:22px;">
        <div>
          <div style="font-size:12.5px; font-weight:700; letter-spacing:1px; color:#0E7C8C; margin-bottom:8px;">MINHA CONTA</div>
          <h1 style="font-size:clamp(24px,3.6vw,32px); font-weight:800; margin:0; letter-spacing:-0.6px;">Olá, {{ firstName }}</h1>
        </div>

        <div style="background:#fff; border:1px solid #eef0f2; border-radius:16px; padding:24px; display:flex; flex-direction:column; gap:14px;">
          <div style="display:flex; justify-content:space-between; align-items:center; padding-bottom:14px; border-bottom:1px solid #f2f3f5;">
            <span style="font-size:13px; color:#8a8f98;">E-mail</span>
            <span style="font-size:14px; font-weight:600;">{{ email }}</span>
          </div>
          <div style="display:flex; justify-content:space-between; align-items:center;">
            <span style="font-size:13px; color:#8a8f98;">Permissão</span>
            <span style="{{ roleBadgeStyle }}">{{ roleLabel }}</span>
          </div>
        </div>

        <sc-if value="{{ isAdmin }}" hint-placeholder-val="{{ false }}">
          <a href="./Admin.dc.html" style="display:flex; align-items:center; justify-content:space-between; background:#14161a; color:#fff; padding:18px 22px; border-radius:16px; font-weight:700; font-size:14.5px;">
            Abrir painel administrativo do blog
            <span>→</span>
          </a>
        </sc-if>
      </div>
    </div>
  </sc-if>

</div>

</x-dc>
<script type="text/x-dc" data-dc-script>
class Component extends DCLogic {
  state = { status: 'loading', session: null, profile: null };

  async componentDidMount() {
    const cfg = await import('./supabase-config.js');
    if (!cfg.SUPABASE_CONFIGURED) {
      this.setState({ status: 'loggedOut' });
      return;
    }
    this._supabase = await cfg.getSupabase();
    const { data } = await this._supabase.auth.getSession();
    if (!data.session) {
      this.setState({ status: 'loggedOut' });
      return;
    }
    const profile = await cfg.getProfile(this._supabase, data.session.user.id);
    this.setState({ status: 'ready', session: data.session, profile });

    this._supabase.auth.onAuthStateChange((_e, session) => {
      if (!session) this.setState({ status: 'loggedOut', session: null, profile: null });
    });
  }

  handleLogout = async () => {
    await this._supabase.auth.signOut();
    window.location.href = './Login.dc.html';
  };

  renderVals() {
    const s = this.state;
    const email = s.session ? s.session.user.email : '';
    const isAdmin = !!s.profile && s.profile.role === 'admin';
    const firstName = (s.profile && s.profile.full_name ? s.profile.full_name.split(' ')[0] : email.split('@')[0]) || '';
    return {
      showLoading: s.status === 'loading',
      showLoggedOut: s.status === 'loggedOut',
      showDashboard: s.status === 'ready',
      email,
      firstName,
      isAdmin,
      roleLabel: isAdmin ? 'Administrador' : 'Usuário',
      roleBadgeStyle: 'font-size:11.5px; font-weight:700; padding:4px 12px; border-radius:100px; background:#EEF7F8; color:#0E7C8C;',
      onLogout: this.handleLogout
    };
  }
}

</script>
</body>
</html>
